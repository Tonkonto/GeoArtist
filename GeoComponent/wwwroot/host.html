<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="origin" />
    <title>GeoArtist Host</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.18.3/dist/leaflet-geoman.css" />
    <link rel="stylesheet" href="./css/geoArtist.css" />
</head>
<body style="margin:0;">
    <div id="geoartist-root"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.18.3/dist/leaflet-geoman.min.js"></script>

    <script src="./js/geoArtist.state.js"></script>
    <script src="./js/geoArtist.events.js"></script>
    <script src="./js/geoArtist.geojson.js"></script>
    <script src="./js/geoArtist.map.js"></script>
    <script src="./js/geoArtist.geoman.js"></script>
    <script src="./js/geoArtist.editor.js"></script>
    <script src="./js/geoArtist.js"></script>

    <script>
        (function () {
            function hasFunction(target, methodName) {
                return !!target && typeof target[methodName] === "function";
            }

            function ensureContainer(payload) {
                const mapId = payload?.mapOptions?.mapId;
                if (!mapId) {
                    return null;
                }

                const root = document.getElementById("geoartist-root");

                if (!root) {
                    return null;
                }

                const mode = (payload.mode ?? "map").toLowerCase();
                const outputId = `${mapId}-geojson-output`;
                const isEditorMode = mode === "editor";
                const useGeoJsonTextArea = (payload.editorOptions?.useGeoJsonTextArea) !== false;

                let shell = root.firstElementChild;

                if (!shell || !shell.classList || !shell.classList.contains("geoartist-shell")) {
                    shell = document.createElement("div");
                    shell.className = "geoartist-shell";
                    root.replaceChildren(shell);
                }

                shell.setAttribute("data-geoartist-mode", mode);

                Array.from(shell.querySelectorAll(".geoartist-map")).forEach(function (element) {
                    if (element.id !== mapId) {
                        element.remove();
                    }
                });

                let mapElement = document.getElementById(mapId);

                if (!mapElement || !shell.contains(mapElement)) {
                    mapElement = document.createElement("div");
                    mapElement.id = mapId;
                    mapElement.className = "geoartist-map";
                    shell.prepend(mapElement);
                }

                mapElement.style.height = payload.mapOptions.height ?? "600px";

                let output = document.getElementById(outputId);

                if (isEditorMode && useGeoJsonTextArea) {
                    if (!output || !shell.contains(output)) {
                        output = document.createElement("textarea");
                        output.id = outputId;
                        output.className = "geoartist-geojson-output";
                        shell.appendChild(output);
                    }
                } else if (output && shell.contains(output)) {
                    output.remove();
                }

                return mapElement;
            }

            function bootstrapFromHostMessage(payload) {
                if (!payload || !payload.mapOptions) {
                    return;
                }

                ensureContainer(payload);

                if (!hasFunction(window.GeoArtist, "bootstrap")) {
                    return;
                }

                window.GeoArtist.bootstrap(payload);
            }

            if (window.chrome?.webview) {
                window.chrome.webview.addEventListener("message", function (e) {
                    const data = e?.data;

                    if (data?.type !== "geoartist.render") {
                        return;
                    }

                    bootstrapFromHostMessage(data.payload);
                });

                window.chrome.webview.postMessage({ type: "geoartist.host.ready" });
            }
        })();
    </script>
</body>
</html>
